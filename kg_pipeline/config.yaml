# Pipeline config: recent-first, high-impact journals (see docs/PIPELINE_STRATEGY.md)
#
# ── TEST MODE (cheap validation, no wasted API quota) ──────────────────────────
#   fetch.days_back: 7
#   fetch.max_results: 3
#   Then run: python run_pipeline.py
#   Verify:   python src/validate_run.py --strict
#
# ── PRODUCTION MODE (broad KG, Phase 4 expansion) ────────────────────────────
#   fetch.days_back: 90
#   fetch.max_results: 50   (or 100)
# ─────────────────────────────────────────────────────────────────────────────

fetch:
  # Phase 4 expansion: use days_back: 90, max_results: 50 (or 100) for broader KG (docs/PIPELINE_STRATEGY.md)
  days_back: 3650        # Search papers from last N days (10 years for maximum coverage)
  max_results: 500      # Max papers per run (expanded for broader KG coverage)
  request_delay_sec: 1   # Delay between NCBI requests (be polite)
  skip_existing: true    # Skip PMCIDs that already have a file in raw_papers (incremental fetch)
  humans_only: true      # Restrict to human studies only (no animal models); uses "humans"[MeSH Terms]

  # Optional: narrow search by topic; empty = no keyword filter (broadest, more results)
  topic_keywords: []
  # Optional: second query for aging/biology (merged with topic_keywords results). See docs/AGING_AND_HUMAN_BIOLOGY.md
  aging_keywords: ["aging", "sarcopenia", "bone health", "life course",
                   "longevity", "healthspan", "lifespan", "centenarian",
                   "telomere", "epigenetic aging", "biological age",
                   "mitochondrial dysfunction", "cellular senescence",
                   "inflammaging", "autophagy", "mTOR", "NAD+",
                   "caloric restriction", "intermittent fasting"]

  # High-impact open access medical journals (PubMed journal names)
  journals:
    - "Nat Med"           # Nature Medicine
    - "Lancet"
    - "N Engl J Med"      # New England Journal of Medicine
    - "JAMA"
    - "BMJ"
    - "Cell"
    - "Science"
    - "Nature"
    - "Ann Intern Med"
    - "Am J Clin Nutr"    # American Journal of Clinical Nutrition
    - "Nutrients"          # MDPI Nutrients — broad nutrition research
    - "Adv Nutr"           # Advances in Nutrition — review articles
    - "J Nutr"             # Journal of Nutrition
    - "Diabetes Care"      # Diabetes management & nutrition
    - "Diabetologia"       # Diabetes research
    - "Eur Heart J"        # Cardiovascular — diet & heart disease
    - "Circulation"        # Cardiovascular nutrition
    - "JAMA Neurol"        # Neurology — diet & brain health
    - "Lancet Neurol"      # Neurology — dementia, diet
    - "Aging Cell"         # Aging & longevity nutrition
    - "Gut"                # Gut microbiome & diet
    - "Gastroenterology"   # GI & dietary interventions
    - "Eur J Clin Nutr"    # European clinical nutrition
    - "PLoS Med"           # Broad open-access medicine
    # Neurology / Dementia / Alzheimer's
    - "Alzheimers Dement"  # Alzheimer's & dementia — diet & brain health
    - "JAMA Psychiatry"    # Psychiatry — mood disorders & diet
    - "Mol Psychiatry"     # Molecular psychiatry — gut-brain axis
    # Nephrology / Kidney disease
    - "Kidney Int"         # Chronic kidney disease — renal diet
    - "J Am Soc Nephrol"   # Nephrology — protein/potassium/phosphate intake
    # Oncology / Cancer prevention
    - "Lancet Oncol"       # Cancer prevention — dietary risk factors
    - "J Natl Cancer Inst" # Cancer epidemiology — diet & cancer
    # Cardiology
    - "J Am Coll Cardiol"  # Cardiology — dietary interventions
    # Endocrinology / Metabolic
    - "J Clin Endocrinol Metab"  # Hormones, metabolic disease, nutrition
    # Specific nutrition
    - "Br J Nutr"          # British Journal of Nutrition — broad nutrition
    - "Nutr Rev"           # Nutrition Reviews — systematic reviews
    - "Front Nutr"         # Frontiers in Nutrition — open access, high volume
    - "Public Health Nutr" # Population-level dietary patterns
    - "Food Funct"         # Food bioactivity & functional effects
    # Aging / Longevity / Healthspan
    - "Age Ageing"                     # Geriatric nutrition & frailty
    - "J Gerontol A Biol Sci Med Sci"  # Aging biology — dietary interventions
    - "GeroScience"                    # Geroscience — mechanisms of aging & diet
    - "NPJ Aging"                      # Nature Partner — aging biology
    - "Aging (Albany NY)"              # Aging journal — longevity interventions
    - "Longev Healthspan"              # Longevity & healthspan research
    - "Mech Ageing Dev"                # Mechanisms of aging & nutrition
    # Longevity / Metabolism / Systems biology
    - "Cell Metab"                     # Cell Metabolism — high-impact metabolic research
    - "Nat Aging"                      # Nature Aging — top longevity journal
    - "eLife"                          # Open-access — broad high-impact biology
    - "PLOS ONE"                       # High-volume open-access — nutrition & health
    - "Sci Rep"                        # Scientific Reports — broad health research
    # Microbiome / Gut-Brain
    - "Microbiome"                     # Gut microbiome & diet — health outcomes
    - "Cell Host Microbe"              # Host-microbiome interactions
    - "NPJ Biofilm Microbiomes"        # Microbiome & nutrition
    # Immunology / Inflammation
    - "J Neuroinflammation"            # Neuroinflammation & diet
    - "Front Immunol"                  # Frontiers Immunology — diet & immune health
    # Endocrinology / Hormones
    - "Thyroid"                        # Thyroid & nutritional status
    - "J Endocrinol"                   # Hormones & nutrition
    # Sleep / Circadian
    - "Sleep"                          # Sleep & nutrition interactions
    - "J Sleep Res"                    # Sleep research & diet

paths:
  raw_papers: "data/raw_papers"
  extracted_triples: "data/extracted_triples"
  master_graph: "data/extracted_triples/master_graph.json"
  manifests: "data/manifests"   # per-run manifests for cascade; each agent reads previous output from here

# Extract agent: configure backend model here.
# Gemini (default — requires GEMINI_API_KEY in kg_pipeline/.env):
#   model: "gemini-2.0-flash-lite"           # cheapest Gemini; 45s delay between papers (rate limit)
#
# AWS Bedrock (requires AWS credentials; much higher rate limits; no per-key quota):
#   model: "bedrock/amazon.nova-micro-v1:0"               # $0.035/$0.14 per 1M tokens — cheapest
#   model: "bedrock/amazon.nova-lite-v1:0"                # $0.06/$0.24 per 1M tokens — multimodal
#   model: "bedrock/anthropic.claude-3-haiku-20240307-v1:0"  # $0.25/$1.25 per 1M — highest accuracy
#   bedrock_region: "us-east-1"              # optional; default us-east-1
extract:
  model: "bedrock/amazon.nova-micro-v1:0"   # AWS Bedrock Nova Micro — no quota limits, 1s delay between papers

smart_fetch:
  nutrition_journals:
    - "Nutrients"
    - "Br J Nutr"
    - "J Nutr"
    - "Eur J Nutr"
    - "Am J Clin Nutr"
    - "Nutr Rev"
    - "Clin Nutr"
    - "Front Nutr"
    - "Int J Environ Res Public Health"
    - "Public Health Nutr"
    - "Food Funct"
    - "Int J Food Sci Nutr"
    - "Nutr Metab Cardiovasc Dis"
    - "Nutr Cancer"
    - "J Acad Nutr Diet"
  gap_threshold: 5             # entities with < N relationships = underrepresented
  max_per_cluster: 25          # papers per topic cluster per run
  days_back: 2555              # 7-year window for maximum coverage
  use_mesh: true

  # Phase 1: KG-targeted gap query settings
  max_gap_queries: 30          # total entity-targeted queries per smart-fetch
  max_gap_queries_per_type: 8  # max queries per gap type

  # Specialty journals — broad disease + nutrition coverage
  specialty_journals:
    # Neurology / Alzheimer's / Dementia
    - "JAMA Neurol"
    - "Lancet Neurol"
    - "Alzheimers Dement"
    - "Neurology"
    - "J Alzheimers Dis"
    - "Brain"
    - "Ann Neurol"
    # Kidney
    - "Kidney Int"
    - "J Am Soc Nephrol"
    - "Clin J Am Soc Nephrol"
    - "Nephrol Dial Transplant"
    # Oncology / Pancreatic
    - "Lancet Oncol"
    - "J Natl Cancer Inst"
    - "Cancer Epidemiol Biomarkers Prev"
    - "Gut"
    # Psychiatry / Depression
    - "JAMA Psychiatry"
    - "Mol Psychiatry"
    - "J Affect Disord"
    - "Psychosom Med"
    # Cardiovascular
    - "Eur Heart J"
    - "Circulation"
    - "J Am Coll Cardiol"
    - "JACC"
    # Diabetes / Metabolic
    - "Diabetes Care"
    - "Diabetologia"
    - "J Clin Endocrinol Metab"
    # Aging / Longevity
    - "Aging Cell"
    - "J Gerontol A Biol Sci Med Sci"
    - "Age Ageing"
    # Broad nutrition
    - "Public Health Nutr"
    - "Int J Food Sci Nutr"
    - "Food Funct"

  # ── Medical KG clusters (biomarkers, mechanisms, trials, drug interactions) ──
  medical_clusters:
    biomarker_nutrition:
      keywords: ["biomarker", "HbA1c", "LDL cholesterol", "dietary intervention", "CRP diet",
                 "triglycerides nutrition", "fasting glucose diet", "eGFR nutrition"]
      mesh: ["Biomarkers", "Glycated Hemoglobin", "Cholesterol, LDL", "C-Reactive Protein"]
    mechanism_pathways:
      keywords: ["insulin signaling", "oxidative stress", "anti-inflammatory mechanism",
                 "gut-brain axis", "neuroinflammation diet", "endothelial dysfunction nutrition",
                 "AMPK activation food", "sirtuin diet", "autophagy nutrition"]
      mesh: ["Signal Transduction", "Oxidative Stress", "Insulin Resistance"]
    clinical_trials_diet:
      keywords: ["randomized controlled trial", "dietary intervention", "clinical trial nutrition",
                 "PREDIMED", "DASH trial", "Mediterranean diet trial"]
      mesh: ["Randomized Controlled Trials as Topic", "Diet Therapy"]
    drug_nutrient_interaction:
      keywords: ["drug-nutrient interaction", "contraindication", "warfarin vitamin K",
                 "metformin B12", "statin coenzyme Q10", "food drug interaction"]
      mesh: ["Drug Interactions", "Food-Drug Interactions"]

  # Parallel worker settings (auto-tuned by NCBI_API_KEY env var)
  # Without key: 3 workers, 2.5 req/s  |  With key: 5 workers, 7 req/s
  # Set NCBI_API_KEY in kg_pipeline/.env for higher throughput (free at ncbi.nlm.nih.gov)

continuous_build:
  papers_per_run: 5       # extract this many new papers per invocation (cloud: higher throughput)
  extract_delay_sec: 2    # pause between extraction calls (Bedrock: much faster than Gemini)
  max_retries: 3
  use_api_retry_after: true   # parse retryDelay from Gemini error JSON
  max_wait_sec: 120       # if retryDelay > this, skip the paper

# USDA FoodData Central — optional quantitative nutrient data stream
# Run manually: python src/fetch_usda.py
# Get free API key: https://fdc.nal.usda.gov/api-guide.html
usda:
  enabled: false          # Set to true to enable USDA fetch
  max_foods: 5            # Number of food queries per run
  api_key: ""             # Required when enabled: true

# Gemini audit — sample claim quality check (no Neo4j writes)
# Run manually: python src/audit_graph.py
audit:
  sample_size: 5          # Number of triples to classify per run (keep small to control cost)
  model: "gemini-2.0-flash-lite"
