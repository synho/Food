version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: health_navigation_kg
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt (RPC)
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    environment:
      # Project default: user and password both "foodnot4self"
      - NEO4J_AUTH=foodnot4self/foodnot4self
      - NEO4J_PLUGINS=["apoc"]
