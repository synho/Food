# Health Navigation — 전체 스택 (Neo4j + API 서버 + 웹)
# 레포 루트에서: docker compose up -d
# 웹: http://localhost:3001  API: http://localhost:8000  Neo4j: http://localhost:7474

services:
  neo4j:
    image: neo4j:latest
    container_name: health_navigation_kg
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: foodnot4self/foodnot4self
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: food-server:latest
    container_name: health_navigation_server
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: foodnot4self
      NEO4J_PASSWORD: foodnot4self
    depends_on:
      neo4j:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: food-web:latest
    container_name: health_navigation_web
    ports:
      - "3001:3000"
    environment:
      BACKEND_URL: http://server:8000
    depends_on:
      - server

volumes:
  neo4j_data:
  neo4j_logs:
